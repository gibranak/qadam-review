<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Qadam — Aesthetic Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #F7F5F2; --surface: #FFFFFF; --ink: #1A1714; --muted: #8A847D;
    --accent: #C4A882; --like: #3D6B4F; --dislike: #8B3A3A;
    --like-bg: #EDF4EF; --dislike-bg: #F9EDEC; --border: #E8E3DD;
    --radius: 16px; --shadow: 0 4px 32px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink);
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    padding: 12px 16px 10px; display: flex; align-items: center;
    justify-content: space-between; background: var(--bg);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar-brand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; letter-spacing: 0.12em; }
  .topbar-brand span { color: var(--accent); }
  .progress-label { font-size: 12px; color: var(--muted); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; margin-left: 6px; vertical-align: middle; transition: background 0.4s; }
  .sync-dot.saving { background: var(--accent); }
  .sync-dot.saved  { background: var(--like); }
  .sync-dot.error  { background: var(--dislike); }

  /* SCOREBOARD */
  .scoreboard { padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 0; }
  .scoreboard::-webkit-scrollbar { display: none; }
  .score-row { display: flex; gap: 6px; width: max-content; }
  .score-pill { display: flex; flex-direction: column; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 5px 10px; min-width: 80px; transition: border-color 0.2s, background 0.2s; }
  .score-pill.goal-met { border-color: var(--like); background: var(--like-bg); }
  .score-pill.close { border-color: var(--accent); }
  .pill-type { font-size: 9px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .pill-count { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--ink); }
  .score-pill.goal-met .pill-count { color: var(--like); }
  .pill-goal { font-size: 8px; color: var(--muted); }
  .score-pill.goal-met .pill-goal { color: var(--like); font-weight: 500; }

  /* PROGRESS BAR */
  .progress-bar-wrap { height: 2px; background: var(--border); flex-shrink: 0; }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

  /* CARD VIEWPORT */
  .card-viewport { flex: 1; overflow: hidden; position: relative; touch-action: none; }
  .card-strip { position: absolute; top: 0; left: 0; right: 0; will-change: transform; }

  .card-outer {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 12px 16px 0;
  }

  .card {
    width: 100%; max-width: 400px; background: var(--surface);
    border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); position: relative;
  }

  /* Rating badge */
  .rating-badge {
    position: absolute; top: 12px; left: 12px; z-index: 8;
    padding: 4px 11px; border-radius: 6px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; border: 2px solid; display: none;
  }
  .rating-badge.liked    { display: block; color: var(--like);    border-color: var(--like);    background: rgba(237,244,239,0.92); }
  .rating-badge.disliked { display: block; color: var(--dislike); border-color: var(--dislike); background: rgba(249,237,236,0.92); }

  /* CAROUSEL */
  .carousel { width: 100%; aspect-ratio: 3/4; position: relative; overflow: hidden; background: #F0EDE8; }
  .carousel-track { display: flex; height: 100%; transition: transform 0.26s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
  .carousel-slide { flex: 0 0 100%; height: 100%; }
  .carousel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .photo-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 5; }
  .photo-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.45); transition: background 0.2s, transform 0.2s; cursor: pointer; }
  .photo-dot.active { background: #fff; transform: scale(1.35); }

  .photo-counter { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.36); color: #fff; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; z-index: 5; letter-spacing: 0.04em; display: none; }
  .source-tag { position: absolute; bottom: 10px; left: 10px; background: rgba(255,255,255,0.82); backdrop-filter: blur(4px); padding: 2px 8px; border-radius: 20px; font-size: 10px; color: var(--muted); font-weight: 500; z-index: 5; }

  /* Card footer */
  .card-footer { padding: 9px 13px 11px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); }
  .card-title { font-size: 12px; color: var(--ink); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
  .card-price { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }

  .nav-hint { font-size: 11px; color: var(--muted); text-align: center; padding: 7px 0 4px; letter-spacing: 0.02em; }

  /* BUTTONS */
  .actions { padding: 10px 20px 20px; background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 14px; justify-content: center; flex-shrink: 0; }
  .btn { flex: 1; max-width: 160px; height: 52px; border: none; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: transform 0.1s; letter-spacing: 0.02em; }
  .btn:active { transform: scale(0.95); }
  .btn-dislike { background: var(--dislike-bg); color: var(--dislike); border: 1.5px solid #DDB8B8; }
  .btn-like    { background: var(--like-bg);    color: var(--like);    border: 1.5px solid #A8C9B2; }
  .btn.active-like    { background: var(--like);    color: #fff; border-color: var(--like); }
  .btn.active-dislike { background: var(--dislike); color: #fff; border-color: var(--dislike); }
  .btn-icon { font-size: 18px; line-height: 1; }

  /* LOADING */
  #loading-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .loader-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; letter-spacing: 0.1em; }
  .loader-sub { font-size: 13px; color: var(--muted); }

  /* DONE */
  .state-screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; gap: 14px; }
  .state-screen.active { display: flex; }
  .state-icon  { font-size: 52px; }
  .state-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; }
  .state-sub   { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 280px; }
  .btn-export  { padding: 13px 30px; background: var(--ink); color: #fff; border: none; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; width: 240px; transition: background 0.2s; }
  .btn-export:hover { background: #2C2825; }
  .btn-export.green { background: var(--like); }
  .btn-export.green:hover { background: #2d5440; }
  .btn-restart { padding: 10px 24px; background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; margin-top: 4px; }
</style>
</head>

const SHEETS_URL = /*SHEETS_URL*/"https://script.google.com/macros/s/AKfycbxmMf5COxp-obIc27n5hxDtvHcuFc8wHisAuEKEYapZWnd7FOe386wNYjtL67tx4SB9/exec"/*END_SHEETS_URL*/;

const STORAGE_KEY = 'qadam_review_v2';
const GOAL = 10;

let products     = [];
let current      = 0;
let typeCounts   = {};
let photoIndexes = {};   // { productIdx: photoIdx }
let cardHeight   = 0;
let syncTimer    = null;

// ── INIT ──
function init() {
  if (!EMBEDDED_PRODUCTS) {
    document.getElementById('loading-sub').textContent = '⚠ No product data. Run bake.py first.';
    return;
  }
  if (SHEETS_URL) {
    document.getElementById('loading-sub').textContent = 'Fetching saved progress…';
    fetchFromSheets()
      .then(state => restoreOrFresh(state))
      .catch(() => restoreOrFresh(loadLocal()));
  } else {
    restoreOrFresh(loadLocal());
  }
}

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) { return null; }
}

function restoreOrFresh(state) {
  if (state && state.products && state.products.length === EMBEDDED_PRODUCTS.length) {
    products     = state.products;
    current      = Math.min(state.current || 0, products.length - 1);
    typeCounts   = state.typeCounts   || {};
    photoIndexes = state.photoIndexes || {};
    const rated = products.filter(p => p.aesthetic_appeal !== null).length;
    document.getElementById('loading-sub').textContent = `Resuming — ${rated} of ${products.length} rated`;
  } else {
    products = JSON.parse(JSON.stringify(EMBEDDED_PRODUCTS));
    products.sort(() => Math.random() - 0.5);
    typeCounts = {};
    photoIndexes = {};
    [...new Set(products.map(p => p.type))].forEach(t => typeCounts[t] = 0);
    current = 0;
    document.getElementById('loading-sub').textContent = `${products.length} products to review`;
  }
  setTimeout(startReview, 500);
}

function startReview() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('review-ui').style.display = 'flex';
  buildScoreboard();
  renderCards();
  updateProgress();
  scrollToCard(current, false);
  updateButtons();
}

// ── RENDER ALL CARDS ──
function renderCards() {
  const vp    = document.getElementById('card-viewport');
  const strip = document.getElementById('card-strip');
  cardHeight  = vp.clientHeight;
  strip.innerHTML = '';

  products.forEach((p, i) => {
    const images   = getImages(p);
    const photoIdx = photoIndexes[i] || 0;
    const rated    = p.aesthetic_appeal;

    const outer = document.createElement('div');
    outer.className = 'card-outer';
    outer.id = `card-outer-${i}`;
    outer.style.height = cardHeight + 'px';

    outer.innerHTML = `
      <div class="card" id="card-${i}">
        <div class="carousel">
          <div class="carousel-track" id="track-${i}" style="transform:translateX(-${photoIdx*100}%)">
            ${images.map((src, si) => `<div class="carousel-slide"><img src="${src}" alt="" loading="${si===0?'eager':'lazy'}"></div>`).join('')}
          </div>
          <div class="photo-dots" id="dots-${i}">
            ${images.length > 1 ? images.map((_,si) =>
              `<div class="photo-dot${si===photoIdx?' active':''}" data-card="${i}" data-photo="${si}"></div>`
            ).join('') : ''}
          </div>
          <div class="photo-counter" id="counter-${i}" style="display:${images.length>1?'block':'none'}">${photoIdx+1} / ${images.length}</div>
          <div class="source-tag">${p.brand||''}</div>
          <div class="rating-badge ${rated||''}" id="badge-${i}">${rated==='liked'?'♥ LIKED':rated==='disliked'?'✕ PASSED':''}</div>
        </div>
        <div class="card-footer">
          <div class="card-title">${p.title||''}</div>
          <div class="card-price">${p.price?'₹'+Math.round(p.price).toLocaleString('en-IN'):''}</div>
        </div>
      </div>
      <div class="nav-hint" style="max-width:400px;width:100%">
        ${images.length>1 ? '← → photos' : ''} &nbsp; ↑↓ products
      </div>`;
    strip.appendChild(outer);
  });

  // Dot listeners
  strip.querySelectorAll('.photo-dot').forEach(dot =>
    dot.addEventListener('click', e => {
      e.stopPropagation();
      setPhoto(+dot.dataset.card, +dot.dataset.photo);
    })
  );
}

// ── PHOTO NAV ──
function setPhoto(cardIdx, photoIdx) {
  const images = getImages(products[cardIdx]);
  photoIdx = Math.max(0, Math.min(photoIdx, images.length - 1));
  photoIndexes[cardIdx] = photoIdx;
  const track = document.getElementById(`track-${cardIdx}`);
  if (track) track.style.transform = `translateX(-${photoIdx*100}%)`;
  const counter = document.getElementById(`counter-${cardIdx}`);
  if (counter) counter.textContent = `${photoIdx+1} / ${images.length}`;
  document.querySelectorAll(`#dots-${cardIdx} .photo-dot`)
    .forEach((d, i) => d.classList.toggle('active', i === photoIdx));
}

// ── PRODUCT NAV ──
function scrollToCard(idx, animate = true) {
  idx = Math.max(0, Math.min(idx, products.length - 1));
  current = idx;
  const strip = document.getElementById('card-strip');
  strip.style.transition = animate ? 'transform 0.32s cubic-bezier(0.4,0,0.2,1)' : 'none';
  strip.style.transform  = `translateY(-${idx * cardHeight}px)`;
  updateProgress();
  updateButtons();
}

function updateProgress() {
  const rated = products.filter(p => p.aesthetic_appeal !== null).length;
  document.getElementById('progress-label').textContent = `${current+1} / ${products.length}`;
  document.getElementById('progress-bar').style.width   = (rated / products.length * 100) + '%';
}

function updateButtons() {
  const verdict = products[current]?.aesthetic_appeal;
  document.getElementById('btn-like').className    = 'btn btn-like'    + (verdict==='liked'    ? ' active-like'    : '');
  document.getElementById('btn-dislike').className = 'btn btn-dislike' + (verdict==='disliked' ? ' active-dislike' : '');
}

// ── JUDGE ──
function judge(verdict) {
  const p    = products[current];
  const prev = p.aesthetic_appeal;

  // Adjust type counts
  if (prev === 'liked' && verdict !== 'liked') { typeCounts[p.type] = Math.max(0,(typeCounts[p.type]||0)-1); updateScoreboard(p.type); }
  if (verdict === 'liked' && prev !== 'liked') { typeCounts[p.type] = (typeCounts[p.type]||0)+1;             updateScoreboard(p.type); }

  p.aesthetic_appeal = verdict;

  // Track liked photo
  if (verdict === 'liked') {
    const imgs = getImages(p);
    p.liked_image_url = imgs[photoIndexes[current] || 0] || p.image_url;
  } else {
    delete p.liked_image_url;
  }

  // Update badge
  const badge = document.getElementById(`badge-${current}`);
  if (badge) {
    badge.className   = `rating-badge ${verdict}`;
    badge.textContent = verdict === 'liked' ? '♥ LIKED' : '✕ PASSED';
  }

  updateButtons();
  saveProgress();

  // Auto-advance to next unrated
  const nextUnrated = products.findIndex((q, i) => i > current && q.aesthetic_appeal === null);
  const target = nextUnrated !== -1 ? nextUnrated : (current < products.length - 1 ? current + 1 : -1);
  if (target !== -1) {
    setTimeout(() => scrollToCard(target), 200);
  } else if (products.every(q => q.aesthetic_appeal !== null)) {
    setTimeout(showDone, 400);
  }
}

// ── SCOREBOARD ──
function buildScoreboard() {
  const row = document.getElementById('score-row');
  row.innerHTML = '';
  [...new Set(products.map(p => p.type))].filter(Boolean).forEach(type => {
    const count = typeCounts[type] || 0;
    const pill  = document.createElement('div');
    pill.className = 'score-pill' + (count>=GOAL ? ' goal-met' : count>=7 ? ' close' : '');
    pill.id = 'pill-' + type.replace(/[^a-z]/gi,'_');
    const short = type.replace(' / ','/').replace(' Heel','');
    pill.innerHTML = `<div class="pill-type">${short}</div><div class="pill-count">${count}</div><div class="pill-goal">${count>=GOAL?'✓ done':GOAL-count+' to go'}</div>`;
    row.appendChild(pill);
  });
}

function updateScoreboard(type) {
  const pill = document.getElementById('pill-' + type.replace(/[^a-z]/gi,'_'));
  if (!pill) return;
  const count = typeCounts[type] || 0;
  pill.className = 'score-pill' + (count>=GOAL ? ' goal-met' : count>=7 ? ' close' : '');
  pill.querySelector('.pill-count').textContent = count;
  pill.querySelector('.pill-goal').textContent  = count>=GOAL ? '✓ done' : GOAL-count+' to go';
  pill.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// ── TOUCH ──
let tx0=0, ty0=0, tDir=null;

document.getElementById('card-viewport').addEventListener('touchstart', e => {
  tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; tDir=null;
}, { passive:true });

document.getElementById('card-viewport').addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - tx0;
  const dy = e.touches[0].clientY - ty0;
  if (!tDir) {
    if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>10) tDir='h';
    else if (Math.abs(dy)>Math.abs(dx) && Math.abs(dy)>10) tDir='v';
  }
  if (tDir==='v') {
    const strip = document.getElementById('card-strip');
    strip.style.transition = 'none';
    strip.style.transform  = `translateY(${-(current*cardHeight - dy*0.4)}px)`;
  }
}, { passive:true });

document.getElementById('card-viewport').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (tDir==='h' && Math.abs(dx)>40) {
    setPhoto(current, (photoIndexes[current]||0) + (dx<0?1:-1));
  } else if (tDir==='v' && Math.abs(dy)>60) {
    scrollToCard(current + (dy<0?1:-1));
  } else if (tDir==='v') {
    scrollToCard(current); // snap back
  }
  tDir = null;
}, { passive:true });

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')  setPhoto(current,(photoIndexes[current]||0)-1);
  if (e.key==='ArrowRight') setPhoto(current,(photoIndexes[current]||0)+1);
  if (e.key==='ArrowUp')    scrollToCard(current-1);
  if (e.key==='ArrowDown')  scrollToCard(current+1);
  if (e.key==='l'||e.key==='L') judge('liked');
  if (e.key==='d'||e.key==='D') judge('disliked');
});

// ── SAVE / LOAD ──
function saveProgress() {
  const state = { products, current, typeCounts, photoIndexes };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  if (SHEETS_URL) {
    setSyncDot('saving');
    clearTimeout(syncTimer);
    syncTimer = setTimeout(() => saveToSheets(state), 1500);
  }
}

function setSyncDot(s) { document.getElementById('sync-dot').className = 'sync-dot ' + s; }

async function saveToSheets(state) {
  try {
    await fetch(SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'save', state }) });
    setSyncDot('saved');
  } catch(e) { setSyncDot('error'); }
}

async function fetchFromSheets() {
  const res  = await fetch(SHEETS_URL + '?action=load');
  const data = await res.json();
  return data.state || null;
}

// ── DONE ──
function showDone() {
  document.getElementById('review-ui').style.display = 'none';
  document.getElementById('done-screen').classList.add('active');
  const liked  = products.filter(p=>p.aesthetic_appeal==='liked').length;
  const passed = products.filter(p=>p.aesthetic_appeal==='disliked').length;
  const goalsmet = Object.values(typeCounts).filter(c=>c>=GOAL).length;
  const allTypes = [...new Set(products.map(p=>p.type))].length;
  document.getElementById('done-summary').innerHTML =
    `${liked} liked · ${passed} passed<br>${goalsmet} of ${allTypes} types hit the ${GOAL}-like goal.`;
}

// ── EXPORT ──
function exportCSV() {
  const headers = ['brand','title','type','color','price','url','image_url','liked_image_url','image_urls','tags','categories','description','aesthetic_appeal'];
  const rows = products.filter(p=>p.aesthetic_appeal!==null).map(p =>
    headers.map(h => {
      const v = p[h];
      if (Array.isArray(v)) return '"'+v.join(', ').replace(/"/g,'""')+'"';
      if (typeof v==='string') return '"'+v.replace(/"/g,'""')+'"';
      return v??'';
    }).join(',')
  );
  dl('\ufeff'+[headers.join(','),...rows].join('\n'), 'qadam_review.csv', 'text/csv');
}

function exportJSON() { dl(JSON.stringify(products,null,2),'qadam_reviewed.json','application/json'); }

function dl(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = filename; a.click();
}

function clearAndRestart() {
  if (confirm('Erase all progress and start over?')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

function getImages(p) {
  if (p.image_urls && p.image_urls.length>0) return p.image_urls;
  if (p.image_url) return [p.image_url];
  return [''];
}

init();
</script>
